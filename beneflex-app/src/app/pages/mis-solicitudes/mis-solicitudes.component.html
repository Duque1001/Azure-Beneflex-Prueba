<h2>Mis Solicitudes</h2>

<table *ngIf="solicitudes.length > 0; else sinDatos">
    <thead>
        <tr>
            <th>Beneficio</th>
            <th>Días</th>
            <th>Estado</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let s of solicitudes">
            <td>{{ s.benefit?.name }}</td>
            <td>{{ s.requested_days }}</td>
            <td>{{ s.status }}</td>
            <td>{{ s.created_at | date }}</td>
        </tr>
    </tbody>
</table>

<ng-template #sinDatos>
    <p>No tienes solicitudes registradas.</p>
</ng-template>
