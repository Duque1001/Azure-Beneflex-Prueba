<div *ngIf="cargando">Cargando pendientes...</div>
<div *ngIf="errorMsg">{{ errorMsg }}</div>

<div *ngIf="!cargando && solicitudes.length === 0">
  No hay solicitudes pendientes.
</div>

<div *ngFor="let req of solicitudes" class="card">
  <p><strong>Usuario:</strong> {{ req.user?.nombre || req.user?.name || req.user_id }}</p>
  <p><strong>Beneficio:</strong> {{ req.benefit?.name || req.benefit?.title || req.benefit_id }}</p>
  <p><strong>Días:</strong> {{ req.requested_days }}</p>
  <p><strong>Estado:</strong> {{ req.status || 'PENDING' }}</p>

  <!-- Botones quedan activos pero por ahora solo hacen console.warn
       cuando tengas el endpoint real, descomentamos -->
  <button (click)="aprobar(req.id)">Aprobar</button>
  <button (click)="rechazar(req.id)">Rechazar</button>
</div>
