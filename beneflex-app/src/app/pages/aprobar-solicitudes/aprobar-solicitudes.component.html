<div *ngIf="cargando">Cargando pendientes...</div>

<div *ngFor="let req of solicitudes" class="card">
  <p><strong>Usuario:</strong> {{ req.userName }}</p>
  <p><strong>Beneficio:</strong> {{ req.benefitName }}</p>
  <p><strong>Días:</strong> {{ req.requestedDays }}</p>
  <p><strong>Estado:</strong> {{ req.status }}</p>
  <p><strong>Fecha:</strong> {{ req.startDate | date:'dd-MM-yyyy' }}</p>

  <button (click)="aprobar(req.id)">Aprobar</button>
  <button (click)="rechazar(req.id)">Rechazar</button>
</div>
